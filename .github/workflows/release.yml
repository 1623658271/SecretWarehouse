name: Build And Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

      release_name:
        description: "Optional release title"
        required: false
        type: string

      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean

      draft:
        description: "Create release as draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: SecretWarehouse
  NODE_VERSION: "22"

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - runner: ubuntu-latest
            label: linux-x64
            target: x86_64-unknown-linux-gnu

          - runner: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc

          - runner: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-${{ matrix.label }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev \
            libsoup2.4-dev

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -d "src-tauri/icons/icon.iconset" ]; then
            iconutil -c icns \
              -o "src-tauri/icons/icon.icns" \
              "src-tauri/icons/icon.iconset"
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck --if-present

      - name: ESLint
        run: npm run lint --if-present

      - name: Build frontend
        run: npm run build

      - name: Rust check
        shell: bash
        run: |
          cargo check \
            --manifest-path src-tauri/Cargo.toml \
            --target ${{ matrix.target }}

      - name: Rust clippy
        shell: bash
        run: |
          cargo clippy \
            --manifest-path src-tauri/Cargo.toml \
            --target ${{ matrix.target }} \
            -- -D warnings

      - name: Build Tauri application
        shell: bash
        env:
          CI: true
        run: |
          npm run tauri build -- --target ${{ matrix.target }}

      - name: Package build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail

          BASE_NAME="${APP_NAME}-${TAG_NAME}-${{ matrix.label }}"

          mkdir -p release

          APPIMAGE=$(find src-tauri/target -name "*.AppImage" -type f | head -1)

          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "release/${BASE_NAME}.AppImage"
            chmod +x "release/${BASE_NAME}.AppImage"
          fi

          DEB=$(find src-tauri/target -name "*.deb" -type f | head -1)

          if [ -n "$DEB" ]; then
            cp "$DEB" "release/${BASE_NAME}.deb"
          fi

          ls -lh release/

      - name: Package build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail

          BASE_NAME="${APP_NAME}-${TAG_NAME}-${{ matrix.label }}"

          mkdir -p release

          DMG=$(find src-tauri/target -name "*.dmg" -type f | head -1)

          if [ -n "$DMG" ]; then
            cp "$DMG" "release/${BASE_NAME}.dmg"
          fi

          APP=$(find src-tauri/target -name "*.app" -type d | head -1)

          if [ -n "$APP" ]; then
            cd "$(dirname "$APP")"

            /usr/bin/ditto \
              -c \
              -k \
              --sequesterRsrc \
              --keepParent \
              "$(basename "$APP")" \
              "${OLDPWD}/release/${BASE_NAME}.zip"

            cd "$OLDPWD"
          fi

          ls -lh release/

      - name: Package build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          $BASE_NAME = "${env:APP_NAME}-${env:TAG_NAME}-${{ matrix.label }}"

          New-Item -ItemType Directory -Force -Path release

          $NSIS = Get-ChildItem `
            -Path "src-tauri/target" `
            -Filter "*.exe" `
            -Recurse |
            Where-Object { $_.FullName -match "nsis" } |
            Select-Object -First 1

          if ($NSIS) {
            Copy-Item `
              $NSIS.FullName `
              "release/${BASE_NAME}-setup.exe"
          }

          $MSI = Get-ChildItem `
            -Path "src-tauri/target" `
            -Filter "*.msi" `
            -Recurse |
            Select-Object -First 1

          if ($MSI) {
            Copy-Item `
              $MSI.FullName `
              "release/${BASE_NAME}.msi"
          }

          Get-ChildItem release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: release/**
          if-no-files-found: warn

  release:
    name: Publish Release
    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lhR release-assets/

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
            release_name="${{ inputs.release_name }}"
            prerelease="${{ inputs.prerelease }}"
            draft="${{ inputs.draft }}"
          else
            tag_name="${GITHUB_REF_NAME}"
            release_name=""
            prerelease="false"
            draft="false"
          fi

          if [ -z "$release_name" ]; then
            release_name="${{ env.APP_NAME }} ${tag_name}"
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: release-assets/*
