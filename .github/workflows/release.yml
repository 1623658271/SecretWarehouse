name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v0.1.0)'
        required: true
        type: string
      release_name:
        description: 'Release name'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      draft:
        description: 'Create as draft'
        required: false
        type: boolean
        default: false

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x64
          - platform: windows
            os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            arch: x64
          - platform: macos
            os: macos-14
            target: aarch64-apple-darwin
            arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.platform }}-${{ matrix.arch }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev

      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows'
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        run: npm ci

      - name: Get version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build Tauri application
        run: cargo tauri build --target ${{ matrix.target }}
        working-directory: src-tauri

      - name: Package Linux artifacts
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ARCH=${{ matrix.arch }}
          BASE_NAME="SecretWarehouse-v${VERSION}-linux-${ARCH}"
          mkdir -p artifacts

          # Package AppImage
          APPIMAGE_PATH=$(find src-tauri/target -name "*.AppImage" | head -1)
          if [ -n "$APPIMAGE_PATH" ]; then
            cp "$APPIMAGE_PATH" "artifacts/${BASE_NAME}.AppImage"
            chmod +x "artifacts/${BASE_NAME}.AppImage"
          fi

          # Package tar.gz (from deb for simplicity)
          DEB_PATH=$(find src-tauri/target -name "*.deb" | head -1)
          if [ -n "$DEB_PATH" ]; then
            cp "$DEB_PATH" "artifacts/${BASE_NAME}.deb"
          fi

          # Create tar.gz with AppImage
          if [ -n "$APPIMAGE_PATH" ]; then
            mkdir -p tmp_package
            cp "$APPIMAGE_PATH" "tmp_package/SecretWarehouse"
            chmod +x "tmp_package/SecretWarehouse"
            tar -czf "artifacts/${BASE_NAME}.tar.gz" -C tmp_package .
            rm -rf tmp_package
          fi

          ls -la artifacts/

      - name: Package macOS artifacts
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ARCH=${{ matrix.arch }}
          BASE_NAME="SecretWarehouse-v${VERSION}-macos-${ARCH}"
          mkdir -p artifacts

          # Find and copy DMG
          DMG_PATH=$(find src-tauri/target -name "*.dmg" | head -1)
          if [ -n "$DMG_PATH" ]; then
            cp "$DMG_PATH" "artifacts/${BASE_NAME}.dmg"
          fi

          # Create zip with .app bundle
          APP_PATH=$(find src-tauri/target/release/bundle -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r -y "${OLDPWD}/artifacts/${BASE_NAME}.zip" "$(basename "$APP_PATH")"
            cd "$OLDPWD"
          fi

          ls -la artifacts/

      - name: Package Windows artifacts
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $ARCH = "${{ matrix.arch }}"
          $BASE_NAME = "SecretWarehouse-v${VERSION}-windows-${ARCH}"
          New-Item -ItemType Directory -Force -Path artifacts

          # Find and copy NSIS installer (.exe)
          $NSIS_PATH = Get-ChildItem -Path "src-tauri/target" -Filter "*.exe" -Recurse | Where-Object { $_.FullName -match "nsis" } | Select-Object -First 1
          if ($NSIS_PATH) {
            Copy-Item $NSIS_PATH.FullName "artifacts/${BASE_NAME}-setup.exe"
          }

          # Create zip with portable version
          $EXE_PATH = Get-ChildItem -Path "src-tauri/target/release" -Filter "SecretWarehouse.exe" | Select-Object -First 1
          if ($EXE_PATH) {
            Compress-Archive -Path $EXE_PATH.FullName -DestinationPath "artifacts/${BASE_NAME}-portable.zip"
          }

          Get-ChildItem -Path artifacts

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: artifacts/*
          retention-days: 1

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: artifacts/*
          retention-days: 1

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: artifacts/*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: artifacts/linux-x64

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: artifacts/macos-arm64

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: artifacts/windows-x64

      - name: List all artifacts
        run: find artifacts -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ github.event.inputs.release_name || format('SecretWarehouse {0}', steps.tag.outputs.tag) }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            artifacts/linux-x64/*
            artifacts/macos-arm64/*
            artifacts/windows-x64/*
